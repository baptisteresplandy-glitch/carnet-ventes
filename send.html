<!DOCTYPE html>

<html>
<head><meta charset="UTF-8"><title>Envoi...</title></head>
<body>
<script>
(async function() {
  const p = new URLSearchParams(window.location.search);
  const scriptUrl = p.get('url');
  const date      = p.get('date');
  const montant   = p.get('montant');
  const mode      = p.get('mode');

if (!scriptUrl) { window.close(); return; }

try {
await fetch(scriptUrl, {
method: ‘POST’,
mode: ‘no-cors’,
headers: { ‘Content-Type’: ‘text/plain’ },
body: JSON.stringify({ date, montant, mode })
});
} catch(e) {}

try { if (window.opener) window.opener.postMessage(‘vente_ok’, ‘*’); } catch(e) {}

setTimeout(() => window.close(), 500);
})();
</script>

</body>
</html>
